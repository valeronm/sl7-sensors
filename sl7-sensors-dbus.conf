<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<!-- System-bus policy for the net.hadess.SensorProxy name: only root may
     own it; anyone may talk to it. Functionally interchangeable with the
     policy iio-sensor-proxy installs (both files may coexist), shipped so
     the name is ownable on systems without that package. -->
<busconfig>
  <policy user="root">
    <allow own="net.hadess.SensorProxy"/>
  </policy>
  <policy context="default">
    <allow send_destination="net.hadess.SensorProxy"
           send_interface="net.hadess.SensorProxy"/>
    <allow send_destination="net.hadess.SensorProxy"
           send_interface="org.freedesktop.DBus.Properties"/>
    <allow send_destination="net.hadess.SensorProxy"
           send_interface="org.freedesktop.DBus.Introspectable"/>
    <allow send_destination="net.hadess.SensorProxy"
           send_interface="org.freedesktop.DBus.Peer"/>
  </policy>
</busconfig>
