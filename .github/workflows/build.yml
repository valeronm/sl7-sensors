name: build
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          submodules: true

      - name: Install build dependencies
        # build-dep reads debian/control, so the list can't drift from it
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential lintian shellcheck
          sudo apt-get build-dep -y ./

      - name: Static checks
        run: |
          shellcheck sl7-sensors setup
          python3 -m py_compile sensor-proxy read-sensor

      - name: Check tag matches debian/changelog version
        if: github.ref_type == 'tag'
        run: |
          ver=$(dpkg-parsechangelog -SVersion)
          if [ "v$ver" != "$GITHUB_REF_NAME" ]; then
            echo "tag $GITHUB_REF_NAME does not match changelog version $ver" >&2
            exit 1
          fi

      - name: Build package
        run: dpkg-buildpackage -us -uc -b

      - name: Lintian
        run: lintian --display-info --pedantic --fail-on error,warning ../sl7-sensors_*.deb

      - name: Collect artifacts
        run: mkdir dist && mv ../sl7-sensors_*.deb ../sl7-sensors_*.changes ../sl7-sensors_*.buildinfo dist/

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: deb
          path: dist/

  release:
    if: github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: deb
          path: dist

      - name: Create or update release
        # update path: a moved tag (rebuilt release) replaces the assets
        # instead of failing on the existing release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/*.deb --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$GITHUB_REF_NAME" dist/*.deb \
              --repo "$GITHUB_REPOSITORY" \
              --title "sl7-sensors $GITHUB_REF_NAME" \
              --generate-notes
          fi
